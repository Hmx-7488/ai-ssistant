# 餐饮AI客服 - 扣子工作流配置
# 版本: v1.0
# 更新时间: 2026-05-27

workflow:
  name: "饭小二餐饮客服工作流"
  description: "幽默、专业、快速响应的餐饮AI客服"
  version: "1.0"

# ============ 节点配置 ============
nodes:
  # 节点1: 开始节点
  - id: "start"
    type: "start"
    name: "用户输入"
    outputs:
      - name: "user_input"
        type: "string"
        description: "用户输入的文本"

  # 节点2: 意图识别节点
  - id: "intent_recognition"
    type: "llm"
    name: "意图识别"
    model: "doubao-pro-32k"  # 豆包大模型，响应快
    config:
      temperature: 0.1  # 低温度，确保分类稳定
      max_tokens: 100
      timeout: 500ms
    prompt: |
      你是餐饮客服意图识别专家。快速判断用户意图。

      用户输入: {{user_input}}

      【意图分类规则】
      1. 价格查询: 询问价格、多少钱、人均消费、收费、费用
         例: "红烧肉多少钱" "人均多少" "这个贵吗"
      2. 菜品推荐: 想要推荐、不知道吃什么、有什么好吃的
         例: "有什么推荐" "不知道吃什么" "来点特色菜"
      3. 点餐咨询: 想点餐、询问菜品详情、食材、口味
         例: "我想吃鱼" "这个菜辣吗" "有什么忌口"
      4. 订座服务: 订座、预约、包间、位置
         例: "我想订座" "有包间吗" "预约明天"
      5. 投诉建议: 不满、投诉、建议、问题反馈
         例: "菜太咸了" "服务态度差" "建议改进"
      6. 订单查询: 查询订单、催单、上菜时间
         例: "我的菜好了吗" "等多久了" "催一下"
      7. 闲聊互动: 打招呼、闲聊、其他非餐饮问题
         例: "你好" "今天心情不好" "你是谁"

      请只输出意图类别名称，不要解释。
    outputs:
      - name: "intent"
        type: "string"
        description: "识别出的意图类别"

  # 节点3: 场景分流节点
  - id: "route_decision"
    type: "condition"
    name: "场景分流"
    conditions:
      - if: "intent == '点餐咨询'"
        then: "order_service"
      - if: "intent == '菜品推荐'"
        then: "recommend_service"
      - if: "intent == '价格查询'"
        then: "price_service"
      - if: "intent == '订座服务'"
        then: "reservation_service"
      - if: "intent == '投诉建议'"
        then: "complaint_service"
      - if: "intent == '订单查询'"
        then: "order_status_service"
      - else: "general_chat"

  # 节点4: 知识库检索节点
  - id: "knowledge_retrieval"
    type: "knowledge"
    name: "知识库检索"
    knowledge_bases:
      - name: "菜品知识库"
        type: "json"
        path: "./knowledge-base/products.json"
      - name: "FAQ知识库"
        type: "json"
        path: "./knowledge-base/faq.json"
    retrieval_config:
      top_k: 3
      threshold: 0.7
      method: "hybrid"  # 混合检索：向量+关键词
    outputs:
      - name: "retrieved_info"
        type: "string"
        description: "检索到的相关知识"

  # 节点5: 点餐服务节点
  - id: "order_service"
    type: "llm"
    name: "点餐服务"
    model: "doubao-pro-32k"
    config:
      temperature: 0.7
      max_tokens: 500
      streaming: true
    prompt: |
      你是"饭小二"，现在处理点餐服务。
      
      【回复要求】
      - 热情但不油腻
      - 专业推荐，说明菜品亮点
      - 适时使用幽默，但不影响信息传达
      - 关键信息（价格、食材）必须准确
      
      【用户输入】
      {{user_input}}
      
      【检索到的知识】
      {{retrieved_info}}
      
      【回复格式】
      1. 回应用户需求
      2. 推荐2-3个选项（菜品名+一句话亮点+价格）
      3. 引导用户选择
      
      请用幽默、专业的语气回复。
    outputs:
      - name: "response"
        type: "string"
        description: "回复内容"

  # 节点6: 菜品推荐节点
  - id: "recommend_service"
    type: "llm"
    name: "菜品推荐"
    model: "doubao-pro-32k"
    config:
      temperature: 0.7
      max_tokens: 500
      streaming: true
    prompt: |
      你是"饭小二"，现在为用户推荐菜品。
      
      【推荐策略】
      - 根据用户口味偏好推荐
      - 根据用餐人数推荐合适套餐
      - 根据场景（约会、聚餐、一人食）推荐
      - 突出今日特色和优惠活动
      
      【用户输入】
      {{user_input}}
      
      【检索到的知识】
      {{retrieved_info}}
      
      【回复格式】
      1. 询问或确认用户偏好
      2. 推荐2-3个选项（emoji+菜品名+亮点+价格）
      3. 给出搭配建议
      
      请用热情、有趣的语气回复，让推荐更有吸引力。
    outputs:
      - name: "response"
        type: "string"
        description: "回复内容"

  # 节点7: 价格查询节点
  - id: "price_service"
    type: "llm"
    name: "价格查询"
    model: "doubao-pro-32k"
    config:
      temperature: 0.5
      max_tokens: 300
    prompt: |
      你是"饭小二"，用户在询问价格信息。

      【回复要求】
      - 价格信息必须准确，从知识库中获取
      - 突出性价比
      - 适度幽默，增加亲切感

      【用户输入】
      {{user_input}}

      【检索到的知识】
      {{retrieved_info}}

      【回复格式】
      1. 直接回答用户询问的价格
      2. 用幽默的方式突出性价比
      3. 引导用户下单

      请基于检索到的知识准确回复价格信息，不要编造价格。
    outputs:
      - name: "response"
        type: "string"
        description: "回复内容"

  # 节点8: 投诉处理节点
  - id: "complaint_service"
    type: "llm"
    name: "投诉处理"
    model: "doubao-pro-32k"
    config:
      temperature: 0.5
      max_tokens: 400
    prompt: |
      你是"饭小二"，用户在投诉或表达不满。
      
      【处理原则】
      1. 真诚道歉，表达理解
      2. 幽默适度，化解尴尬
      3. 提供具体解决方案
      4. 必要时转人工
      
      【用户输入】
      {{user_input}}
      
      【检索到的知识】
      {{retrieved_info}}
      
      【回复格式】
      1. 表达歉意
      2. 提供2-3个解决方案
      3. 引导用户选择
      
      请用真诚、略带幽默的语气回复，让用户感到被重视。
    outputs:
      - name: "response"
        type: "string"
        description: "回复内容"

  # 节点9: 订座服务节点
  - id: "reservation_service"
    type: "llm"
    name: "订座服务"
    model: "doubao-pro-32k"
    config:
      temperature: 0.5
      max_tokens: 300
    prompt: |
      你是"饭小二"，用户想订座。
      
      【收集信息】
      - 姓名
      - 电话
      - 用餐人数
      - 用餐时间
      - 是否需要包间
      
      【用户输入】
      {{user_input}}
      
      【检索到的知识】
      {{retrieved_info}}
      
      请热情地帮助用户订座，必要时询问缺少的信息。
    outputs:
      - name: "response"
        type: "string"
        description: "回复内容"

  # 节点10: 订单状态节点
  - id: "order_status_service"
    type: "llm"
    name: "订单状态"
    model: "doubao-pro-32k"
    config:
      temperature: 0.5
      max_tokens: 300
    prompt: |
      你是"饭小二"，用户在查询订单状态或催单。
      
      【回复要求】
      - 表达歉意（如等待时间长）
      - 用幽默化解焦虑
      - 提供预计时间
      
      【用户输入】
      {{user_input}}
      
      请用幽默、安抚的语气回复，让用户耐心等待。
    outputs:
      - name: "response"
        type: "string"
        description: "回复内容"

  # 节点11: 闲聊节点
  - id: "general_chat"
    type: "llm"
    name: "闲聊互动"
    model: "doubao-pro-32k"
    config:
      temperature: 0.8
      max_tokens: 200
    prompt: |
      你是"饭小二"，用户在闲聊或打招呼。
      
      【回复要求】
      - 热情友好
      - 适度幽默
      - 引导到点餐主题
      
      【用户输入】
      {{user_input}}
      
      请用热情、幽默的语气回复，并自然地引导到点餐主题。
    outputs:
      - name: "response"
        type: "string"
        description: "回复内容"

  # 节点12: 结束节点
  - id: "end"
    type: "end"
    name: "输出回复"
    inputs:
      - name: "final_response"
        type: "string"
        description: "最终回复内容"

# ============ 连接配置 ============
edges:
  # 主流程: 开始 → 意图识别 → 条件分支
  - from: "start"
    to: "intent_recognition"

  - from: "intent_recognition"
    to: "route_decision"

  # 条件分支 → 知识检索（统一检索）
  - from: "route_decision"
    to: "knowledge_retrieval"
    condition: "intent == '价格查询' || intent == '点餐咨询' || intent == '菜品推荐' || intent == '投诉建议' || intent == '订座服务'"

  # 条件分支 → 闲聊（不需要知识检索）
  - from: "route_decision"
    to: "general_chat"
    condition: "intent == '闲聊互动'"

  # 条件分支 → 订单查询（不需要知识检索）
  - from: "route_decision"
    to: "order_status_service"
    condition: "intent == '订单查询'"

  # 条件分支 → 其他（兜底）
  - from: "route_decision"
    to: "general_chat"
    condition: "else"

  # 知识检索 → 对应服务节点
  - from: "knowledge_retrieval"
    to: "price_service"
    condition: "intent == '价格查询'"

  - from: "knowledge_retrieval"
    to: "order_service"
    condition: "intent == '点餐咨询'"

  - from: "knowledge_retrieval"
    to: "recommend_service"
    condition: "intent == '菜品推荐'"

  - from: "knowledge_retrieval"
    to: "complaint_service"
    condition: "intent == '投诉建议'"

  - from: "knowledge_retrieval"
    to: "reservation_service"
    condition: "intent == '订座服务'"

  # 所有服务节点 → 结束
  - from: "order_service"
    to: "end"
  - from: "recommend_service"
    to: "end"
  - from: "price_service"
    to: "end"
  - from: "complaint_service"
    to: "end"
  - from: "reservation_service"
    to: "end"
  - from: "order_status_service"
    to: "end"
  - from: "general_chat"
    to: "end"

# ============ 全局配置 ============
global_config:
  # 超时配置
  timeout:
    workflow: 5000ms
    node: 2000ms
  
  # 重试配置
  retry:
    max_attempts: 2
    delay: 100ms
  
  # 缓存配置
  cache:
    enabled: true
    ttl: 3600  # 1小时
    max_size: 1000
  
  # 日志配置
  logging:
    level: "info"
    include_input: true
    include_output: true
  
  # 性能监控
  monitoring:
    enabled: true
    metrics:
      - "response_time"
      - "success_rate"
      - "intent_accuracy"

# ============ 知识库配置 ============
knowledge_base:
  - name: "菜品知识库"
    source: "./knowledge-base/products.json"
    update_frequency: "daily"
    index_type: "vector"
  
  - name: "FAQ知识库"
    source: "./knowledge-base/faq.json"
    update_frequency: "weekly"
    index_type: "hybrid"

# ============ 人设配置 ============
persona:
  name: "饭小二"
  system_prompt_file: "./prompts/system_prompt.md"
  personality:
    - "幽默风趣"
    - "专业热情"
    - "贴心细致"
  language_style:
    - "适度使用网络热梗"
    - "善用比喻和拟人"
    - "语气亲切"
  humor_level:
    普通咨询: 4  # 1-5，5为最幽默
    菜品推荐: 3
    投诉处理: 2
    紧急情况: 1
