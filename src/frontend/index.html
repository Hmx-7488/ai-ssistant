<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>饭小二 - 餐饮AI客服</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:"Segoe UI","Microsoft YaHei",sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);height:100vh;display:flex;justify-content:center;align-items:center}
        .chat-container{width:92%;max-width:520px;height:85vh;background:#fff;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.3);display:flex;flex-direction:column;overflow:hidden}

        /* Header */
        .chat-header{background:linear-gradient(90deg,#ff6b6b,#feca57);color:#fff;padding:16px 20px;display:flex;justify-content:space-between;align-items:center}
        .chat-header h1{font-size:22px}
        .chat-header .sub{font-size:13px;opacity:.9}
        .chat-header .right{text-align:right}
        .status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:middle;transition:background .3s}
        .status-dot.ok{background:#4caf50}.status-dot.err{background:#f44336}
        .new-session{background:rgba(255,255,255,.25);border:none;color:#fff;padding:4px 12px;border-radius:12px;font-size:12px;cursor:pointer;margin-top:4px;transition:background .2s}
        .new-session:hover{background:rgba(255,255,255,.4)}

        /* Messages */
        .chat-messages{flex:1;overflow-y:auto;padding:16px;background:#f5f5f5}
        .message{margin-bottom:12px;display:flex}
        .message.user{justify-content:flex-end}
        .message.bot{justify-content:flex-start}
        .message-content{max-width:82%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.6}
        .message.user .message-content{background:linear-gradient(90deg,#667eea,#764ba2);color:#fff;border-bottom-right-radius:4px}
        .message.bot .message-content{background:#fff;color:#333;border-bottom-left-radius:4px;box-shadow:0 2px 5px rgba(0,0,0,.08)}
        .timestamp{font-size:11px;color:#999;margin-top:4px}
        .message.user .timestamp{text-align:right}

        /* New messages hidden until GSAP animates */
        .message.gsap-new{visibility:hidden}

        /* Typing indicator */
        .typing-indicator{display:flex;align-items:center;gap:4px;padding:10px 14px;background:#fff;border-radius:16px;border-bottom-left-radius:4px;box-shadow:0 2px 5px rgba(0,0,0,.08)}
        .typing-dot{width:8px;height:8px;background:#999;border-radius:50%}

        /* Quick replies */
        .quick-replies{display:flex;flex-wrap:wrap;gap:6px;padding:8px 14px;background:#fff;border-top:1px solid #f0f0f0}
        .quick-reply{padding:6px 12px;background:#f0f0f0;border:1px solid #e0e0e0;border-radius:16px;font-size:12px;cursor:pointer;transition:all .2s;white-space:nowrap}
        .quick-reply:hover{background:#667eea;color:#fff;border-color:#667eea}

        /* Input area */
        .chat-input{padding:12px 14px;background:#fff;border-top:1px solid #eee;display:flex;gap:8px}
        .chat-input input{flex:1;padding:10px 14px;border:2px solid #eee;border-radius:22px;font-size:14px;outline:none;transition:border-color .3s}
        .chat-input input:focus{border-color:#667eea}
        .chat-input button{padding:10px 20px;background:linear-gradient(90deg,#667eea,#764ba2);color:#fff;border:none;border-radius:22px;font-size:14px;cursor:pointer}
        .chat-input button:disabled{opacity:.5;cursor:not-allowed}
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div>
                <h1>🍚 饭小二</h1>
                <div class="sub">LangGraph Multi-Agent</div>
            </div>
            <div class="right">
                <div><span class="status-dot" id="statusDot"></span><span id="statusText">checking...</span></div>
                <button class="new-session" onclick="newSession()">New Session</button>
            </div>
        </div>
        <div class="chat-messages" id="messages">
            <div class="message bot">
                <div class="message-content">
                    哎哟~欢迎光临！我是饭小二，今天想吃点啥？尽管问！
                    <div class="timestamp">饭小二</div>
                </div>
            </div>
        </div>
        <div class="quick-replies">
            <span class="quick-reply" onclick="sendQuickReply('全部菜单')">全部菜单</span>
            <span class="quick-reply" onclick="sendQuickReply('推荐老人吃的菜')">老人推荐</span>
            <span class="quick-reply" onclick="sendQuickReply('花生过敏推荐吃什么')">花生过敏</span>
            <span class="quick-reply" onclick="sendQuickReply('3个人150元预算')">3人150元</span>
            <span class="quick-reply" onclick="sendQuickReply('我想订座')">订座</span>
            <span class="quick-reply" onclick="sendQuickReply('营业到几点')">营业时间</span>
            <span class="quick-reply" onclick="sendQuickReply('有优惠吗')">优惠活动</span>
            <span class="quick-reply" onclick="sendQuickReply('菜太咸了')">投诉</span>
        </div>
        <div class="chat-input">
            <input type="text" id="userInput" placeholder="输入你的问题..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()" id="sendBtn">发送</button>
        </div>
    </div>

    <!-- GSAP (free, including ScrollToPlugin) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollToPlugin.min.js"></script>
    <script>
    (function(){
        gsap.registerPlugin(ScrollToPlugin);

        const API_BASE = "http://localhost:8000";
        let SESSION_ID = "web_" + Math.random().toString(36).substr(2,9);
        const msgBox = document.getElementById("messages");
        const input = document.getElementById("userInput");
        const btn = document.getElementById("sendBtn");

        // ── Page entrance animation ──
        const pageTL = gsap.timeline({ defaults:{ ease:"power3.out" } });
        pageTL.from(".chat-container", { y:40, autoAlpha:0, duration:0.6 })
              .from(".chat-header", { y:-30, autoAlpha:0, duration:0.5 }, "-=0.3")
              .from(".message", { y:15, autoAlpha:0, duration:0.4 }, "-=0.2")
              .from(".quick-reply", { y:12, autoAlpha:0, stagger:0.05, duration:0.3 }, "-=0.2")
              .from(".chat-input", { y:20, autoAlpha:0, duration:0.4 }, "-=0.2");

        // ── Utilities ──
        function timeStr(){
            const d = new Date();
            return d.getHours().toString().padStart(2,"0") + ":" + d.getMinutes().toString().padStart(2,"0");
        }

        function scrollToBottom(){
            gsap.to(msgBox, { duration:0.4, scrollTo:{ y:"max" }, ease:"power2.out" });
        }

        // ── Typing indicator ──
        let typingEl = null;
        function showTyping(){
            if(typingEl) return;
            const row = document.createElement("div");
            row.className = "message bot";
            row.innerHTML = '<div class="typing-indicator">' +
                '<div class="typing-dot"></div>'.repeat(3) + '</div>';
            msgBox.appendChild(row);
            typingEl = row;
            gsap.from(row, { autoAlpha:0, y:10, duration:0.3, ease:"power2.out" });
            gsap.to(row.querySelectorAll(".typing-dot"), {
                y:-5, repeat:-1, yoyo:true, stagger:0.15, duration:0.4, ease:"power1.inOut"
            });
            scrollToBottom();
        }
        function hideTyping(){
            if(!typingEl) return;
            const el = typingEl;
            typingEl = null;
            gsap.to(el, { autoAlpha:0, y:-5, duration:0.2, ease:"power2.in",
                onComplete:()=> el.remove()
            });
        }

        // ── Add message with GSAP animation ──
        function addMsg(html, isUser){
            hideTyping();
            const d = document.createElement("div");
            d.className = "message gsap-new " + (isUser?"user":"bot");
            const c = document.createElement("div");
            c.className = "message-content";
            const label = isUser ? "me" : "饭小二";
            c.innerHTML = html + '<div class="timestamp">' + label + " · " + timeStr() + '</div>';
            d.appendChild(c);
            msgBox.appendChild(d);

            const xFrom = isUser ? 30 : -30;
            gsap.fromTo(d,
                { autoAlpha:0, x:xFrom, y:8, scale:0.96 },
                { autoAlpha:1, x:0, y:0, scale:1, duration:0.4, ease:"back.out(1.4)" }
            );
            scrollToBottom();
        }

        // ── Send message ──
        function handleKeyPress(e){ if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); sendMessage(); } }
        function sendQuickReply(t){ input.value = t; sendMessage(); }

        async function sendMessage(){
            const msg = input.value.trim();
            if(!msg) return;
            addMsg(msg, true);
            input.value = "";

            // Send button press feedback
            gsap.to(btn, { scale:0.92, duration:0.1, yoyo:true, repeat:1, ease:"power2.inOut" });
            btn.disabled = true;

            // Show typing indicator after short delay
            const typingTimer = setTimeout(showTyping, 300);

            try {
                const r = await fetch(API_BASE+"/chat", {
                    method:"POST",
                    headers:{"Content-Type":"application/json"},
                    body:JSON.stringify({ message:msg, session_id:SESSION_ID })
                });
                clearTimeout(typingTimer);
                const d = await r.json();
                if(d.success){
                    const f = d.reply.replace(/\n/g,"<br>").replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>");
                    addMsg(f, false);
                } else {
                    addMsg("哎呀，饭小二开小差了~请稍后再试", false);
                }
            } catch(e) {
                clearTimeout(typingTimer);
                hideTyping();
                addMsg("网络开小差了，请检查后端服务是否启动~", false);
            } finally {
                btn.disabled = false;
                input.focus();
            }
        }

        // ── New session ──
        function newSession(){
            gsap.to(msgBox, {
                opacity:0, y:-10, duration:0.3, ease:"power2.in",
                onComplete:()=>{
                    SESSION_ID = "web_" + Math.random().toString(36).substr(2,9);
                    msgBox.innerHTML = '<div class="message bot"><div class="message-content">' +
                        '新会话已开始！有什么可以帮您？<div class="timestamp">饭小二</div></div></div>';
                    gsap.fromTo(msgBox, { opacity:0, y:10 }, { opacity:1, y:0, duration:0.4, ease:"power2.out" });
                    gsap.from(msgBox.querySelector(".message"), { autoAlpha:0, y:10, duration:0.4, ease:"back.out(1.4)", delay:0.1 });
                }
            });
        }

        // ── Health check ──
        async function checkHealth(){
            try {
                const r = await fetch(API_BASE+"/health");
                const d = await r.json();
                const dot = document.getElementById("statusDot");
                const txt = document.getElementById("statusText");
                if(d.status==="healthy"){
                    dot.className = "status-dot ok";
                    txt.textContent = "ready";
                    gsap.fromTo(dot, { scale:1.8 }, { scale:1, duration:0.5, ease:"elastic.out(1,0.5)" });
                } else {
                    dot.className = "status-dot err"; txt.textContent = "degraded";
                }
            } catch(e) {
                document.getElementById("statusDot").className = "status-dot err";
                document.getElementById("statusText").textContent = "offline";
            }
        }

        checkHealth();
        setInterval(checkHealth, 30000);
        input.focus();

        // Expose for onclick handlers
        window.sendMessage = sendMessage;
        window.sendQuickReply = sendQuickReply;
        window.handleKeyPress = handleKeyPress;
        window.newSession = newSession;
    })();
    </script>
</body>
</html>
